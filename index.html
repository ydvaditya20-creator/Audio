<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Quality MP3 TTS Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: none; box-sizing: border-box; font-size: 16px; }
        select, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 4px; border: none; font-size: 16px; cursor: pointer; }
        select { border: 1px solid #ccc; background: white; }
        button { background: #ff5722; color: white; font-weight: bold; }
        button:hover { background: #e64a19; }
        .instructions { margin-top: 15px; background: #fff8e1; padding: 10px; border-radius: 5px; font-size: 14px; text-align: left; border-left: 5px solid #ffb300; }
    </style>
</head>
<body>

<div class="container">
    <h2>Real MP3 Audio Downloader</h2>
    <textarea id="textInput" placeholder="Yahan apna text likhein..."></textarea>
    
    <select id="langSelect">
        <option value="hi">Hindi (India)</option>
        <option value="en">English (US)</option>
    </select>

    <button onclick="loadAudio()">1. Audio Load Karein</button>
    
    <!-- Yeh Asli High-Quality MP3 Engine hai -->
    <audio id="audioPlayer" controls style="width: 100%; margin-top: 15px; display: none;"></audio>

    <div class="instructions" id="instructionBox" style="display: none;">
        <strong>🎉 Audio Taiyar Hai!</strong><br>
        Download karne ke liye player ke kone mein bane <strong>3 Dots (⋮)</strong> par click karke <strong>Download</strong> dabaayein.
    </div>
</div>

<script>
    function loadAudio() {
        const text = document.getElementById('textInput').value.trim();
        const lang = document.getElementById('langSelect').value;
        const player = document.getElementById('audioPlayer');
        const instructionBox = document.getElementById('instructionBox');

        if (!text) {
            alert("Kripya pehle text box mein kuch likhein!");
            return;
        }

        // Direct Clean MP3 Stream Link
        const ttsUrl = `https://google.com{lang}&client=tw-ob&q=${encodeURIComponent(text)}`;
        
        // Audio player mein link set karna (Ispar browser security block nahi lagata)
        player.src = ttsUrl;
        player.style.display = "block";
        instructionBox.style.display = "block";
        
        // Auto play
        player.play();
    }
</script>

</body>
</html>
